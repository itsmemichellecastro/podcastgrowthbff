<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Successful — Redirecting...</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@0,400;0,600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #FDF8F5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .check {
      width: 64px;
      height: 64px;
      background: #ff4d4d;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 1.8rem;
      color: white;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 900;
      color: #2e2e2e;
      margin-bottom: 12px;
      line-height: 1.15;
    }
    h1 em { font-style: italic; color: #ff4d4d; }
    p {
      font-size: 0.95rem;
      color: rgba(46,46,46,0.6);
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      background: #ff4d4d;
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 16px 36px;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #e03030; }
    .note {
      margin-top: 16px;
      font-size: 0.75rem;
      color: rgba(46,46,46,0.35);
    }
    .countdown {
      font-weight: 700;
      color: #ff4d4d;
    }
  </style>
  <script>
    // Redirect automatically after 3 seconds
    var seconds = 3;
    function countdown() {
      var el = document.getElementById('countdown');
      if (el) el.textContent = seconds;
      if (seconds <= 0) {
        window.location.href = 'https://subtle-druid-d5db71.netlify.app/diagnostic.html?access=pgbff97x2026';
      } else {
        seconds--;
        setTimeout(countdown, 1000);
      }
    }
    window.onload = function() {
      countdown();
    };
  </script>
</head>
<body>
  <div class="card">
    <div class="check">✓</div>
    <h1>Payment confirmed.<br><em>You're in.</em></h1>
    <p>Your B.O.L.D. Diagnostic is ready. You'll be redirected automatically in <span class="countdown" id="countdown">3</span> seconds.</p>
    <a href="https://subtle-druid-d5db71.netlify.app/diagnostic.html?access=pgbff97x2026" class="btn">Start My Diagnostic →</a>
    <p class="note">If you are not redirected automatically, click the button above.</p>
  </div>
</body>
</html>
